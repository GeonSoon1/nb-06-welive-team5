name: CI/CD Pipeline (Blue-Green 2:2)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type Check
        run: npm run typecheck
      - name: Run Tests
        run: npx jest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Build
        run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist/
          retention-days: 7

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 1. [Target 결정] 현재 리스너가 가리키는 타겟 그룹을 확인하여 배포 대상을 선정합니다.
      - name: Determine Target Environment
        run: |
          CURRENT_TG_ARN=$(aws elbv2 describe-listeners --listener-arns ${{ secrets.ALB_LISTENER_ARN }} --query "Listeners[0].DefaultActions[0].TargetGroupArn" --output text)

          echo "CURRENT_TG_ARN=$CURRENT_TG_ARN" >> $GITHUB_ENV

          if [ "$CURRENT_TG_ARN" == "${{ secrets.TG_A_ARN }}" ]; then
            echo "TARGET_NAME=GREEN" >> $GITHUB_ENV
            echo TARGET_INSTANCE_IDS=${{ secrets.EC2_INSTANCE_ID_C }},${{ secrets.EC2_INSTANCE_ID_D }} >> $GITHUB_ENV
            echo "ID_1=${{ secrets.EC2_INSTANCE_ID_C }}" >> $GITHUB_ENV
            echo "ID_2=${{ secrets.EC2_INSTANCE_ID_D }}" >> $GITHUB_ENV
            echo "TARGET_TG_ARN=${{ secrets.TG_B_ARN }}" >> $GITHUB_ENV
            echo "TARGET_PORT=8080" >> $GITHUB_ENV
          else
            echo "TARGET_NAME=BLUE" >> $GITHUB_ENV
            echo TARGET_INSTANCE_IDS=${{ secrets.EC2_INSTANCE_ID_A }},${{ secrets.EC2_INSTANCE_ID_B }} >> $GITHUB_ENV
            echo "ID_1=${{ secrets.EC2_INSTANCE_ID_A }}" >> $GITHUB_ENV
            echo "ID_2=${{ secrets.EC2_INSTANCE_ID_B }}" >> $GITHUB_ENV
            echo "TARGET_TG_ARN=${{ secrets.TG_A_ARN }}" >> $GITHUB_ENV
            echo "TARGET_PORT=80" >> $GITHUB_ENV
          fi

      # 2. [Application 배포] 대상 인스턴스에 최신 코드를 배포하고 지정된 포트로 서비스를 재시작합니다.
      - name: Deploy to Target Instances via SSM
        uses: peterkimzz/aws-ssm-send-command@master
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          instance-ids: |
            ${{ env.ID_1 }}
            ${{ env.ID_2 }}
          working-directory: /home/ubuntu/nb-06-welive-team5
          command: |
            su - ubuntu -c '
              cd /home/ubuntu/nb-06-welive-team5
              git fetch origin main
              git checkout ${{ github.sha }}
              npm install
              npm run build
              npx prisma generate
              npx prisma migrate deploy
            '

            su - ssm-user -c '
              cd /home/ubuntu/nb-06-welive-team5
              PORT=8080 pm2 reload welive-api --update-env
            '

      # 3. [Health Check] 신규 배포된 인스턴스 쌍이 모두 'InService' 상태가 될 때까지 대기합니다.
      - name: Wait for Health Check
        run: |
          echo "Waiting for ${{ env.TARGET_NAME }} pair (${{ env.ID_1 }}, ${{ env.ID_2 }}) at Port ${{ env.TARGET_PORT }}..."
          aws elbv2 wait target-in-service \
            --target-group-arn ${{ env.TARGET_TG_ARN }} \
            --targets Id=${{ env.ID_1 }} Id=${{ env.ID_2 }}

      # 4. [Traffic Switch] 모든 타겟이 정상이면 로드밸런서 리스너를 신규 그룹으로 전환합니다.
      - name: Switch Traffic
        run: |
          aws elbv2 modify-listener --listener-arn ${{ secrets.ALB_LISTENER_ARN }} --default-actions Type=forward,TargetGroupArn=${{ env.TARGET_TG_ARN }}
