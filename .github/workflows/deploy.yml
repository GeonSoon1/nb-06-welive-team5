name: CI Setup

on:
  push:
    branches: [feat/cicd-setup, dev] #배포 준비 끝나면 main으로 변경 예정
  pull_request:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      # DB 서버 인프라가 구축 전이라 CI 단계에서 테스트는 일시적으로 제외
      # - name: Run Tests
      #   run: npm test

      - name: Build
        run: npm run build

      # 빌드된 dist 폴더를 Artifact로 저장
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist/
          retention-days: 7
